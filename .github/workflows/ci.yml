name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d # v16

      - name: Run unit tests
        run: nix develop --command go test -v -coverprofile=coverage.txt ./...

      - name: Filter generated code from coverage
        run: |
          grep -v '/mocks/' coverage.txt \
            | grep -v '/gen/' \
            | grep -v '/cmd/' \
            | grep -v '/sqlcdb/' \
            | grep -v '\.gen\.go' > filtered.txt
          mv filtered.txt coverage.txt

      - name: Compute coverage report
        run: |
          TOTAL=$(nix develop --command go tool cover -func=coverage.txt | grep 'total:' | awk '{print $NF}' | tr -d '%')
          echo "TOTAL_COVERAGE=$TOTAL" >> "$GITHUB_ENV"

          {
            echo "TOP5<<EOF"
            awk '
              !/^mode:/ && NF >= 3 {
                n = split($1, a, ":")
                file = a[1]
                m = split(file, b, "/")
                pkg = ""
                for (i = 1; i <= m; i++) {
                  if (b[i] == "mediaz") { start = i+1; break }
                }
                for (i = start; i < m; i++) {
                  pkg = pkg (pkg ? "/" : "") b[i]
                }
                if (!pkg) pkg = "(root)"
                stmts = $2; hits = $3
                pkg_total[pkg] += stmts
                if (hits > 0) pkg_covered[pkg] += stmts
              }
              END {
                for (p in pkg_total) {
                  pct = (pkg_total[p] > 0) ? pkg_covered[p] / pkg_total[p] * 100 : 0
                  printf "%6.1f%%  %s\n", pct, p
                }
              }
            ' coverage.txt | sort -n | head -5
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Compute patch coverage
        if: github.event_name == 'pull_request'
        run: |
          PATCH=$(python3 scripts/patch-coverage.py coverage.txt main | grep 'PATCH_COVERAGE=' | cut -d= -f2)
          echo "PATCH_COVERAGE=$PATCH" >> "$GITHUB_ENV"

      - name: Post coverage check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          TOTAL_COVERAGE: ${{ env.TOTAL_COVERAGE }}
          PATCH_COVERAGE: ${{ env.PATCH_COVERAGE }}
          TOP5: ${{ env.TOP5 }}
        with:
          script: |
            const total = process.env.TOTAL_COVERAGE || 'N/A';
            const patch = process.env.PATCH_COVERAGE || '';
            const top5 = process.env.TOP5 || '';
            let title = `Coverage: ${total}%`;
            let summary = `Total coverage: **${total}%**`;
            if (patch) {
              title = `Coverage: ${total}% | Patch: ${patch}%`;
              summary += `\nPatch coverage: **${patch}%**`;
            }
            if (top5) {
              summary += `\n\n### Top 5 areas to improve\n${top5}`;
            }
            core.info(`Posting coverage check: ${title}`);

            try {
              const result = await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'Coverage',
                head_sha: context.sha,
                status: 'completed',
                conclusion: 'success',
                output: { title, summary }
              });
              core.info(`Check created: ${result.data.html_url}`);
            } catch (err) {
              core.warning(`Failed to create check run: ${err.message}`);
              let postedFallback = false;
              if (context.eventName === 'pull_request') {
                try {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: `## ${title}\n${summary}`
                  });
                  postedFallback = true;
                  core.info('Posted coverage as PR comment instead');
                } catch (commentErr) {
                  core.warning(`Failed to post PR comment fallback: ${commentErr.message}`);
                }
              }
              if (!postedFallback) {
                core.setFailed('Failed to publish coverage result (check run and fallback unavailable).');
              }
            }

      - name: Build binary
        run: nix develop --command go build .

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
